<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Hub Dashboard</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#090f1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090f1a, #131c2e, #0c1524);
            --glass-bg: rgba(18, 28, 46, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --accent-blue: #0a84ff;
            --warning-red: #ff3b30;
            --success-green: #34c759;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; padding-top: 10px; position: relative; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); border-radius: 24px; }
        .header { margin-bottom: 15px; text-align: left; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .status { color: var(--text-muted); font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--text-muted); }
        .status-dot.active { background-color: var(--success-green); box-shadow: 0 0 10px var(--success-green); }
        .status-dot.offline { background-color: var(--warning-red); box-shadow: 0 0 10px var(--warning-red); }

        .permission-banner { padding: 14px; background: rgba(10, 132, 255, 0.1); border: 1px dashed var(--accent-blue); border-radius: 16px; text-align: center; margin-bottom: 15px; font-weight: 600; font-size: 0.9rem; cursor: pointer; color: var(--accent-blue); display: block; }
        .metric-card { padding: 30px 20px; text-align: center; margin-bottom: 20px; border-radius: 24px; }
        .lbl { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }
        .val { font-size: 3.5rem; font-weight: 800; margin-top: 5px; color: var(--text-main); letter-spacing: -1.5px; }

        .premium-config-card { padding: 22px; margin-bottom: 20px; border-radius: 24px; }
        .config-title-block { text-align: left; margin-bottom: 18px; }
        .config-main-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .numeric-stepper-box { display: flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 16px; padding: 4px; width: 55%; }
        .step-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); color: var(--text-main); width: 42px; height: 42px; border-radius: 12px; font-size: 1.4rem; font-weight: bold; cursor: pointer; }
        .config-input { flex-grow: 1; width: 50px; background: transparent; border: none; text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--text-main); outline: none; }
        .save-action-button { width: 42%; padding: 15px; border-radius: 16px; background: var(--accent-blue); color: #fff; border: none; font-size: 1.05rem; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.25); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 10, 20, 0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { width: 88%; max-width: 360px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); transform: scale(0.9); transition: transform 0.3s ease; }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .btn-confirm { background: var(--accent-blue); color: white; }

        .graph-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;}
        .graph-title { font-size: 1.2rem; font-weight: 700; }
        select { background: var(--glass-bg); color: var(--text-main); padding: 8px 12px; border-radius: 10px; border: 1px solid var(--glass-border); font-size: 0.85rem; font-weight: 600; outline: none; }
        .chart-card { padding: 15px; height: 260px; position: relative; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="customModal" class="modal-overlay">
        <div class="modal-box glass-panel">
            <h3>Confirm Changes</h3>
            <p id="modalMessage">Are you sure you want to change the warning alert threshold level?</p>
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeCustomModal()">Cancel</button>
                <button class="modal-btn btn-confirm" onclick="commitThresholdToDatabase()">Yes, Change</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <div class="header">
            <h1>Dashboard</h1>
            <div class="status">
                <div id="statusDot" class="status-dot"></div>
                <span id="connectionText">Connecting Telemetry...</span>
            </div>
        </div>

        <div id="permissionRequestBanner" class="permission-banner" onclick="requestBrowserNotificationPermission()">
            🔔 Tap here to authorize high-speed notifications
        </div>
        
        <div class="metric-card glass-panel" id="waterCard">
            <div class="lbl">Current Level</div>
            <div id="levelVal" class="val">--<span style="font-size:1.5rem; color:var(--text-muted);"> cm</span></div>
        </div>

        <div class="premium-config-card glass-panel">
            <div class="config-title-block">
                <div class="lbl">Alert Threshold Limit</div>
                <div style="font-size: 0.85rem; color: var(--text-muted); margin-top: 3px; font-weight: 500;">Warnings trigger if level drops below this point.</div>
            </div>
            <div class="config-main-row">
                <div class="numeric-stepper-box">
                    <button class="step-btn" onclick="adjustValue(-0.5)">−</button>
                    <input type="number" id="thresholdInput" class="config-input" step="0.5" value="6.0" readonly>
                    <button class="step-btn" onclick="adjustValue(0.5)">+</button>
                </div>
                <button class="save-action-button" onclick="openCustomModal()">Save Level</button>
            </div>
        </div>

        <div class="graph-header">
            <div class="graph-title">Live Timeline</div>
            <select id="timeRange" onchange="updateChartAxes()">
                <option value="60000">Past 1 Min</option>
                <option value="3600000" selected>Past 1 Hour</option>
                <option value="86400000">Past 1 Day</option>
            </select>
        </div>
        
        <div class="chart-card glass-panel">
            <canvas id="waterChart"></canvas>
        </div>
    </div>

    <script>
        window.userThreshold = 6.0; 
        let pendingValueToSave = 6.0;
        let lastAlertTime = 0;
        let serviceWorkerRegistration = null;

        // --- REGISTER REAL-TIME SERVICE WORKER ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    serviceWorkerRegistration = reg;
                    console.log('High-speed background service worker active.');
                }).catch(err => console.log('Worker setup error:', err));
        }

        if (window.Notification && Notification.permission === "granted") {
            document.getElementById('permissionRequestBanner').style.display = 'none';
        }

        function requestBrowserNotificationPermission() {
            if (!("Notification" in window)) {
                alert("This device layout does not support notification scripts.");
                return;
            }
            Notification.requestPermission().then((permission) => {
                if (permission === "granted") {
                    document.getElementById('permissionRequestBanner').style.display = 'none';
                    if (serviceWorkerRegistration) {
                        serviceWorkerRegistration.showNotification("Circuit Hub Activated", { body: "Real-time hardware tracking online." });
                    }
                }
            });
        }

        function adjustValue(amount) {
            const input = document.getElementById('thresholdInput');
            let current = parseFloat(input.value);
            if (!isNaN(current)) { input.value = (current + amount).toFixed(1); }
        }

        function openCustomModal() {
            pendingValueToSave = parseFloat(document.getElementById('thresholdInput').value);
            if (!isNaN(pendingValueToSave)) {
                document.getElementById('modalMessage').innerText = `Are you sure you want to change the threshold level to ${pendingValueToSave.toFixed(1)} cm?`;
                document.getElementById('customModal').classList.add('active');
            }
        }

        function closeCustomModal() {
            document.getElementById('customModal').classList.remove('active');
            document.getElementById('thresholdInput').value = window.userThreshold.toFixed(1);
        }

        function commitThresholdToDatabase() {
            document.getElementById('customModal').classList.remove('active');
            firebase.database().ref('config/threshold').set(pendingValueToSave)
                .then(() => {
                    const btn = document.querySelector('.save-action-button');
                    btn.innerText = 'Saved!'; btn.style.background = 'var(--success-green)';
                    setTimeout(() => { btn.innerText = 'Save Level'; btn.style.background = 'var(--accent-blue)'; }, 2000);
                });
        }

        // --- HIGH-SPEED NOTIFICATION ENGINE ---
        function triggerPWAAlertNotification(currentLevel) {
            let now = Date.now();
            if (now - lastAlertTime > 15000) { // Safety loop: 15 seconds limit
                lastAlertTime = now;
                
                // Force background service thread to push alert instantly
                if (window.Notification && Notification.permission === "granted" && serviceWorkerRegistration) {
                    serviceWorkerRegistration.showNotification("⚠ CRITICAL WATER ALERT", {
                        body: `Level dropped below safety limit! Current: ${currentLevel.toFixed(1)} cm`,
                        tag: 'tank-alert',
                        renotify: true
                    });
                }
            }
        }

        // --- FIREBASE SYSTEM REAL-TIME DRIVER ---
        const firebaseConfig = { databaseURL: "https://water-level-monitoring-8a0f5-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        db.ref('config/threshold').on('value', (snapshot) => {
            if(snapshot.exists()) {
                window.userThreshold = snapshot.val();
                document.getElementById('thresholdInput').value = window.userThreshold.toFixed(1);
            }
        });

        window.masterDataHistory = []; window.lastPacketReceivedTime = 0;
        const ctx = document.getElementById('waterChart').getContext('2d');
        window.waterChart = new Chart(ctx, {
            type: 'line',
            data: { datasets: [{ label: 'Level (cm)', data: [], borderColor: '#0A84FF', backgroundColor: 'rgba(10, 132, 255, 0.05)', borderWidth: 3, pointRadius: 0, fill: true, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, animation: false, scales: { y: { beginAtZero: true }, x: { type: 'linear', ticks: { maxTicksLimit: 4, callback: function(v) { return new Date(v).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}); } } } }, plugins: { legend: { display: false } } }
        });

        setInterval(updateChartAxes, 1000);
        const connectionText = document.getElementById("connectionText");
        const statusDot = document.getElementById("statusDot");
        const levelVal = document.getElementById("levelVal");
        const waterCard = document.getElementById("waterCard");

        db.ref('sensor1').limitToLast(500).on('value', (snapshot) => {
            if (snapshot.exists()) {
                let tempArray = [];
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    if(data && data.timestamp) { tempArray.push({ x: data.timestamp * 1000, y: data.level }); }
                });

                if(tempArray.length > 0) {
                    window.masterDataHistory = tempArray; 
                    const activePoint = tempArray[tempArray.length - 1];
                    window.lastPacketReceivedTime = activePoint.x / 1000;
                    
                    if ((Date.now() / 1000) - window.lastPacketReceivedTime <= 5) {
                        connectionText.innerText = "System Online"; statusDot.className = "status-dot active"; 
                        levelVal.innerHTML = activePoint.y.toFixed(1) + '<span style="font-size:1.5rem; color:var(--text-muted); font-weight:600;"> cm</span>';

                        if (activePoint.y <= window.userThreshold) {
                            levelVal.style.color = "var(--warning-red)"; waterCard.style.borderColor = "var(--warning-red)"; 
                            triggerPWAAlertNotification(activePoint.y);
                        } else {
                            levelVal.style.color = "var(--text-main)"; waterCard.style.borderColor = "transparent";
                        }
                    }
                    updateChartAxes(); 
                }
            }
        });

        setInterval(() => {
            if (window.lastPacketReceivedTime > 0 && (Date.now() / 1000) - window.lastPacketReceivedTime > 4) {
                connectionText.innerText = "Hardware Offline"; statusDot.className = "status-dot offline"; 
                levelVal.innerHTML = '--<span style="font-size:1.5rem; color:var(--text-muted);"> cm</span>';
                levelVal.style.color = "var(--text-main)"; waterCard.style.borderColor = "transparent";
            }
        }, 1500);

        function updateChartAxes() {
            if (!window.waterChart) return;
            const range = parseInt(document.getElementById('timeRange').value);
            const now = Date.now(); window.waterChart.options.scales.x.min = now - range; window.waterChart.options.scales.x.max = now;
            window.waterChart.data.datasets[0].data = window.masterDataHistory.filter(p => p.x >= (now - range));
            window.waterChart.update('none'); 
        }
    </script>
</body>
</html>
