<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Hub Digital Twin</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#090f1a">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #090f1a, #131c2e, #0c1524);
            --glass-bg: rgba(18, 28, 46, 0.45);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-main: #f5f5f7;
            --text-muted: #a1a1a6;
            --accent-blue: #0a84ff;
            --warning-red: #ff3b30;
            --success-green: #34c759;
            --amber-orange: #ff9500;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-gradient); color: var(--text-main); padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; padding-top: 10px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
        
        .header { margin-bottom: 15px; }
        h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .status { color: var(--text-muted); font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--text-muted); }
        .status-dot.active { background-color: var(--success-green); box-shadow: 0 0 10px var(--success-green); }

        /* --- DIGITAL TWIN TANK ANIMATION --- */
        .digital-twin-card { display: flex; justify-content: space-between; align-items: center; padding: 30px 20px; }
        .metric-side { text-align: left; }
        .lbl { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }
        .val { font-size: 3.8rem; font-weight: 800; margin-top: 5px; color: var(--text-main); letter-spacing: -2px; }
        .raw-val { font-size: 0.9rem; color: var(--accent-blue); margin-top: 5px; font-weight: 600; }

        .tank-wrapper { position: relative; width: 110px; height: 220px; }
        .tank-glass { width: 100%; height: 100%; border: 4px solid rgba(255,255,255,0.15); border-top: none; border-radius: 0 0 20px 20px; position: relative; overflow: hidden; background: rgba(0,0,0,0.3); box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .water-fill { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, #0A84FF, #5AC8FA); transition: height 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 -5px 15px rgba(10, 132, 255, 0.5); }
        .water-surface { position: absolute; top: 0; left: 0; width: 100%; height: 6px; background: rgba(255,255,255,0.3); }

        /* --- CALIBRATION UI --- */
        .calib-input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: #fff; padding: 12px; border-radius: 10px; font-family: monospace; font-size: 14px; margin-top: 8px; margin-bottom: 15px; }
        .btn-sync { background: var(--amber-orange); color: #fff; border: none; padding: 14px; border-radius: 12px; width: 100%; font-size: 1rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>Circuit Hub</h1>
            <div class="status">
                <div id="statusDot" class="status-dot"></div>
                <span id="connectionText">Waiting for hardware...</span>
            </div>
        </div>
        
        <div class="glass-panel digital-twin-card" id="waterCard">
            <div class="metric-side">
                <div class="lbl">Live Depth</div>
                <div id="levelVal" class="val">--</div>
                <div style="font-size:1.2rem; color:var(--text-muted); font-weight: 600;">Centimeters</div>
                <div id="rawVal" class="raw-val">Raw Cap: --</div>
            </div>
            
            <div class="tank-wrapper">
                <div class="tank-glass">
                    <div class="water-fill" id="waterFill" style="height: 0%;">
                        <div class="water-surface"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-panel">
            <div class="lbl" style="margin-bottom: 5px; color: var(--amber-orange);">Cloud Sensor Calibration Matrix</div>
            <div style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; line-height: 1.4;">Map your Raw Capacitance values to actual Centimeters. The ESP32 will automatically download these arrays. Separate numbers with commas.</div>
            
            <label class="lbl">Raw Capacitance Array (Empty to Full)</label>
            <input type="text" id="rawArray" class="calib-input" value="19.0, 15.0, 13.0, 11.3, 9.0, 8.0, 7.0, 6.0, 5.0, 4.0">
            
            <label class="lbl">Target Centimeter Array (Empty to Full)</label>
            <input type="text" id="cmArray" class="calib-input" value="1.0, 2.0, 3.0, 4.0, 6.0, 8.0, 10.0, 12.0, 14.0, 22.0">
            
            <button class="btn-sync" onclick="syncCalibrationToCloud()">☁ Sync Math to Hardware</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://water-level-monitoring-8a0f5-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // Load existing arrays from cloud on boot
        db.ref('config/calib_raw').once('value', snap => { if(snap.exists()) document.getElementById('rawArray').value = snap.val(); });
        db.ref('config/calib_cm').once('value', snap => { if(snap.exists()) document.getElementById('cmArray').value = snap.val(); });

        function syncCalibrationToCloud() {
            const btn = document.querySelector('.btn-sync');
            btn.innerText = "⏳ Pushing to ESP32...";
            
            const raw = document.getElementById('rawArray').value;
            const cm = document.getElementById('cmArray').value;
            
            db.ref('config/calib_raw').set(raw);
            db.ref('config/calib_cm').set(cm);
            
            // Trigger ESP32 to download new arrays
            db.ref('config/update_calib').set(true).then(() => {
                db.ref('config/update_calib').on('value', function check(snap) {
                    if(snap.val() === false) {
                        btn.innerText = "✔ Hardware Successfully Synchronized";
                        btn.style.background = "var(--success-green)";
                        db.ref('config/update_calib').off('value', check);
                        setTimeout(() => { btn.innerText = "☁ Sync Math to Hardware"; btn.style.background = "var(--amber-orange)"; }, 3000);
                    }
                });
            });
        }

        const maxTankCapacityCm = 25.0; // The top of the graphic

        db.ref('sensor1').limitToLast(1).on('value', (snapshot) => {
            snapshot.forEach((child) => {
                const data = child.val();
                if(data && data.timestamp) {
                    // Update Texts
                    document.getElementById("connectionText").innerText = "System Online"; 
                    document.getElementById("statusDot").className = "status-dot active";
                    document.getElementById("levelVal").innerText = data.level.toFixed(1);
                    document.getElementById("rawVal").innerText = "Raw Cap: " + data.pressure.toFixed(2);
                    
                    // Update Tank Animation Height
                    let fillPercentage = (data.level / maxTankCapacityCm) * 100;
                    if(fillPercentage > 100) fillPercentage = 100;
                    if(fillPercentage < 0) fillPercentage = 0;
                    
                    document.getElementById("waterFill").style.height = fillPercentage + "%";

                    // Warning Color Checks
                    if (data.level <= 6.0) { 
                        document.getElementById("levelVal").style.color = "var(--warning-red)"; 
                        document.getElementById("waterFill").style.background = "linear-gradient(to top, #ff3b30, #ff6b22)";
                        document.getElementById("waterFill").style.boxShadow = "0 -5px 15px rgba(255, 59, 48, 0.5)";
                    } else { 
                        document.getElementById("levelVal").style.color = "var(--text-main)"; 
                        document.getElementById("waterFill").style.background = "linear-gradient(to top, #0A84FF, #5AC8FA)";
                        document.getElementById("waterFill").style.boxShadow = "0 -5px 15px rgba(10, 132, 255, 0.5)";
                    }
                }
            });
        });

        // Offline Check
        let lastTime = 0;
        db.ref('sensor1').limitToLast(1).on('value', snap => { snap.forEach(c => { lastTime = Date.now()/1000; }); });
        setInterval(() => {
            if (lastTime > 0 && (Date.now() / 1000) - lastTime > 6) {
                document.getElementById("connectionText").innerText = "Hardware Offline"; 
                document.getElementById("statusDot").className = "status-dot"; 
                document.getElementById("statusDot").style.backgroundColor = "var(--warning-red)";
            }
        }, 2000);
    </script>
</body>
</html>
